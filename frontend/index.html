<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeForge — Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="home.html" class="brand">
      <div class="brand-mark">⬢</div>
      <div class="brand-name">codeforge</div>
    </a>

    <nav class="nav">
      <a href="browse.html">Browse</a>
      <a href="submit.html">Submit Solution</a>
    </nav>

    <div class="nav-right">
      <a class="signin-link" href="#">Sign in</a>
      <a class="cta" href="getstarted.html">Get started</a>
    </div>
  </header>

  <main class="page">
    <section class="hero">
    
      <p class="eyebrow">// WELCOME BACK</p>
      <h1>Sign in to<br>codeforge.</h1>

      <form class="form">
        <input type="email" id="email" placeholder="you@dev.com" autocomplete="email" />
        <div class="input-group">
          <input type="password" id="password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
        </div>
        <button type="submit">Sign in <span>→</span></button>
      </form>

      <p class="bottom-text">New here? <a href="getstarted.html">Create an account</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
